<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOCES SIN FRONTERAS — Admin</title>
  <meta name="theme-color" content="#07070f">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg:       #07070f;
      --bg2:      #0e0e1c;
      --bg3:      #161628;
      --red:      #CF142B;
      --red-dim:  #8a0e1c;
      --gold:     #F4C430;
      --gold-dim: #a8881f;
      --blue:     #1a3a8f;
      --white:    #F5F0E8;
      --muted:    #5a5870;
      --border:   #1e1e32;
      --green:    #2ecc71;
      --green-dim:#1a8a4a;
      --tricolor-grad: linear-gradient(90deg, var(--gold) 0%, var(--blue) 50%, var(--red) 100%);
    }

    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      padding: 1.5rem 1rem 0;
    }
    .header h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--white);
    }
    .header h1 span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.8em;
    }
    .tricolor-bar {
      height: 2px;
      width: 100%;
      background: var(--tricolor-grad);
      margin-top: 1rem;
    }

    /* ===== STATS BAR ===== */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem;
      flex-wrap: wrap;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
    }
    .stat-pill .stat-count {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .stat-pill--pending .stat-count { color: var(--gold); }
    .stat-pill--approved .stat-count { color: var(--green); }
    .stat-pill--rejected .stat-count { color: var(--red); }

    /* ===== CONTROLS ===== */
    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1rem 1rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--bg2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6rem 1.2rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--bg3);
      color: var(--white);
      border-color: var(--gold-dim);
    }

    .poll-btn {
      background: var(--bg3);
      color: var(--gold);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      padding: 0.6rem 1.2rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      transition: all 0.2s;
      margin-left: 0.5rem;
    }
    .poll-btn:active { transform: scale(0.96); }
    .poll-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== TWEET CARDS ===== */
    .cards {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .tweet-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      transition: opacity 0.3s, transform 0.3s;
    }
    .tweet-card.removing {
      opacity: 0;
      transform: translateX(60px);
    }

    .tweet-top {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.6rem;
    }

    .tweet-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg3);
      object-fit: cover;
      flex-shrink: 0;
    }
    .tweet-avatar-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .tweet-author {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .tweet-name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tweet-handle {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .tweet-text {
      font-family: 'Libre Baskerville', serif;
      font-style: italic;
      font-size: 0.95rem;
      line-height: 1.6;
      color: var(--white);
      margin-bottom: 0.8rem;
      word-break: break-word;
    }

    .tweet-time {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .tweet-actions {
      display: flex;
      gap: 0.5rem;
    }
    .tweet-actions button {
      flex: 1;
      min-height: 44px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tweet-actions button:active { transform: scale(0.96); }
    .tweet-actions button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-approve {
      background: rgba(46, 204, 113, 0.15);
      color: var(--green);
      border: 1px solid var(--green-dim);
    }
    .btn-reject {
      background: rgba(207, 20, 43, 0.15);
      color: var(--red);
      border: 1px solid var(--red-dim);
    }
    .btn-remove {
      background: rgba(207, 20, 43, 0.1);
      color: var(--red);
      border: 1px solid var(--red-dim);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .empty-state .emoji {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.5rem;
    }

    /* ===== LOADING SPINNER ===== */
    .spinner {
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    .spinner::after {
      content: '';
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--bg3);
      color: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast--approve { border-color: var(--green-dim); color: var(--green); }
    .toast--reject  { border-color: var(--red-dim);   color: var(--red); }
    .toast--info    { border-color: var(--gold-dim);   color: var(--gold); }
    .toast--error   { border-color: var(--red-dim);    color: var(--red); }
  </style>
</head>
<body>

  <header class="header">
    <h1>VOCES SIN FRONTERAS <span>— Admin</span></h1>
    <div class="tricolor-bar"></div>
  </header>

  <div class="stats-bar">
    <div class="stat-pill stat-pill--pending">
      <span>Pending</span>
      <span class="stat-count" id="count-pending">-</span>
    </div>
    <div class="stat-pill stat-pill--approved">
      <span>Approved</span>
      <span class="stat-count" id="count-approved">-</span>
    </div>
    <div class="stat-pill stat-pill--rejected">
      <span>Rejected</span>
      <span class="stat-count" id="count-rejected">-</span>
    </div>
  </div>

  <div class="controls">
    <button class="tab-btn active" data-tab="pending">Pending</button>
    <button class="tab-btn" data-tab="approved">Approved</button>
    <button class="poll-btn" id="poll-btn">Fetch New Tweets</button>
  </div>

  <div class="cards" id="cards"></div>

  <div class="toast" id="toast"></div>

<script>
// ===== CONFIGURATION =====
const SUPABASE_URL = 'https://aepcfyhjazijcaargtmy.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFlcGNmeWhqYXppamNhYXJndG15Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MDE3NDEsImV4cCI6MjA4OTM3Nzc0MX0.s9yVgSQx8AExoiN5SuLNoKR12_nVSTGRwzvSNe5tcZM';

const HEADERS = {
  'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
  'apikey': SUPABASE_ANON_KEY,
  'Content-Type': 'application/json'
};

// ===== STATE =====
let currentTab = 'pending';
let tweets = [];
let stats = { pending: 0, approved: 0, rejected: 0 };
let refreshTimer = null;

// ===== DOM =====
const cardsEl = document.getElementById('cards');
const toastEl = document.getElementById('toast');
const pollBtn = document.getElementById('poll-btn');

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    fetchTweets();
  });
});

// ===== FETCH TWEETS =====
async function fetchTweets() {
  cardsEl.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch(
      `${SUPABASE_URL}/functions/v1/admin-tweets?status=${currentTab}`,
      { headers: HEADERS }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    tweets = Array.isArray(data) ? data : (data.tweets || []);
    renderCards();
    fetchStats();
  } catch (err) {
    cardsEl.innerHTML =
      '<div class="empty-state">' +
      '<span class="emoji">&#x26A0;&#xFE0F;</span>' +
      'Error loading tweets<br><small>' + escHTML(err.message) + '</small></div>';
  }
}

// ===== FETCH STATS =====
async function fetchStats() {
  try {
    const [pRes, aRes, rRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/functions/v1/admin-tweets?status=pending&count=true`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/functions/v1/admin-tweets?status=approved&count=true`, { headers: HEADERS }),
      fetch(`${SUPABASE_URL}/functions/v1/admin-tweets?status=rejected&count=true`, { headers: HEADERS })
    ]);
    const [pData, aData, rData] = await Promise.all([pRes.json(), aRes.json(), rRes.json()]);

    const count = d => {
      if (typeof d === 'number') return d;
      if (d && typeof d.count === 'number') return d.count;
      if (Array.isArray(d)) return d.length;
      return 0;
    };
    stats.pending = count(pData);
    stats.approved = count(aData);
    stats.rejected = count(rData);
  } catch (_) {
    stats[currentTab] = tweets.length;
  }
  document.getElementById('count-pending').textContent = stats.pending;
  document.getElementById('count-approved').textContent = stats.approved;
  document.getElementById('count-rejected').textContent = stats.rejected;
}

// ===== RENDER =====
function renderCards() {
  if (!tweets.length) {
    const msg = currentTab === 'pending'
      ? 'No pending tweets. Hit "Fetch New Tweets" to pull from X.'
      : 'No approved tweets yet.';
    const icon = currentTab === 'pending' ? '&#x1F4ED;' : '&#x2705;';
    cardsEl.innerHTML = '<div class="empty-state"><span class="emoji">' + icon + '</span>' + msg + '</div>';
    return;
  }
  cardsEl.innerHTML = tweets.map(t => cardHTML(t)).join('');
}

function cardHTML(t) {
  const avatar = t.avatar_url || t.profile_image_url || '';
  const name = escHTML(t.display_name || t.name || t.author_name || 'Unknown');
  const handle = escHTML(t.handle || t.username || t.author_handle || '');
  const text = escHTML(t.text || t.tweet_text || t.content || '');
  const time = t.created_at ? new Date(t.created_at).toLocaleString() : '';
  const id = t.id;

  const avatarEl = avatar
    ? '<img class="tweet-avatar" src="' + escHTML(avatar) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
      '<div class="tweet-avatar-placeholder" style="display:none">&#x1F426;</div>'
    : '<div class="tweet-avatar-placeholder">&#x1F426;</div>';

  let actions = '';
  if (currentTab === 'pending') {
    actions =
      '<div class="tweet-actions">' +
      '<button class="btn-approve" onclick="act(\'' + id + '\',\'approve\',this)">&#x2705; Approve</button>' +
      '<button class="btn-reject" onclick="act(\'' + id + '\',\'reject\',this)">&#x274C; Reject</button>' +
      '</div>';
  } else {
    actions =
      '<div class="tweet-actions">' +
      '<button class="btn-remove" onclick="act(\'' + id + '\',\'reject\',this)">&#x274C; Remove</button>' +
      '</div>';
  }

  return (
    '<div class="tweet-card" id="card-' + id + '">' +
      '<div class="tweet-top">' +
        avatarEl +
        '<div class="tweet-author">' +
          '<div class="tweet-name">' + name + '</div>' +
          '<div class="tweet-handle">' + (handle ? '@' + handle : '') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="tweet-text">' + text + '</div>' +
      (time ? '<div class="tweet-time">' + time + '</div>' : '') +
      actions +
    '</div>'
  );
}

function escHTML(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ===== ACTIONS =====
async function act(id, action, btnEl) {
  const card = document.getElementById('card-' + id);
  if (card) card.querySelectorAll('button').forEach(b => b.disabled = true);

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/admin-tweets`, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify({ id, action })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);

    if (card) {
      card.classList.add('removing');
      setTimeout(() => card.remove(), 300);
    }

    tweets = tweets.filter(t => t.id !== id);

    if (action === 'approve') {
      stats.pending = Math.max(0, stats.pending - 1);
      stats.approved++;
      showToast('Approved!', 'approve');
    } else {
      if (currentTab === 'pending') stats.pending = Math.max(0, stats.pending - 1);
      else stats.approved = Math.max(0, stats.approved - 1);
      stats.rejected++;
      showToast('Rejected', 'reject');
    }
    document.getElementById('count-pending').textContent = stats.pending;
    document.getElementById('count-approved').textContent = stats.approved;
    document.getElementById('count-rejected').textContent = stats.rejected;

    if (!tweets.length) setTimeout(renderCards, 350);
  } catch (err) {
    showToast('Error: ' + err.message, 'error');
    if (card) card.querySelectorAll('button').forEach(b => b.disabled = false);
  }
}

// ===== POLL NEW TWEETS =====
pollBtn.addEventListener('click', async () => {
  pollBtn.disabled = true;
  pollBtn.textContent = 'Fetching...';
  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/poll-tweets`, {
      method: 'POST',
      headers: HEADERS
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const count = data.count || data.new_count || data.inserted || 0;
    showToast(count > 0 ? count + ' new tweet' + (count > 1 ? 's' : '') + ' fetched' : 'No new tweets found', 'info');
    if (count > 0) fetchTweets();
  } catch (err) {
    showToast('Poll error: ' + err.message, 'error');
  } finally {
    pollBtn.disabled = false;
    pollBtn.textContent = 'Fetch New Tweets';
  }
});

// ===== TOAST =====
let toastTimeout;
function showToast(msg, type) {
  clearTimeout(toastTimeout);
  toastEl.textContent = msg;
  toastEl.className = 'toast toast--' + type + ' show';
  toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ===== AUTO-REFRESH =====
function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    if (currentTab === 'pending') fetchTweets();
  }, 30000);
}

// ===== INIT =====
fetchTweets();
startAutoRefresh();
</script>

</body>
</html>
